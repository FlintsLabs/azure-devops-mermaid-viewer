name: Publish Azure DevOps Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to publish, for example 1.0.0"
        required: true
        type: string
  push:
    tags:
      - "release/v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#release/v}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Sync manifest version
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = 'vss-extension.json';
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          manifest.version = process.env.RELEASE_VERSION;
          fs.writeFileSync(path, JSON.stringify(manifest, null, 4) + '\n');
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Install TFX CLI
        run: npm install -g tfx-cli

      - name: Publish extension
        run: |
          tfx extension publish \
            --manifest-globs vss-extension.json \
            --overrides-file configs/release.json \
            --publisher flintslabs \
            --auth-type pat \
            --token "${{ secrets.VS_MARKETPLACE_PAT }}"
